name: gantav_ai
description: "Gantav AI — Your Gantavya. Turn YouTube into structured learning paths."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  google_fonts: ^6.2.1
  http: ^1.2.2
  shared_preferences: ^2.3.3
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  url_launcher: ^6.3.1
  intl: ^0.19.0
  share_plus: ^12.0.2
  youtube_player_iframe: ^5.2.2
  firebase_core: ^4.6.0
  cloud_firestore: ^6.2.0
  firebase_auth: ^6.3.0
  flutter_dotenv: ^6.0.0
  image_picker: ^1.2.1
  google_sign_in: ^6.2.2
  connectivity_plus: ^6.1.0
  firebase_storage: ^13.2.0
  path_provider: ^2.1.4
  youtube_player_flutter: ^9.1.3
  webview_flutter: ^4.13.1
  webview_flutter_android: ^4.10.1
  webview_flutter_wkwebview: ^3.23.0
  # AdMob — banner / medium-rectangle ads placed sparingly (~1 per 6 cards)
  # on Home + Explore. Native ads skipped for pre-launch because they need
  # per-platform layout XML; BannerAd + AdSize.mediumRectangle gives a
  # native-looking card without any native boilerplate.
  google_mobile_ads: ^5.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/pyq/
    # - assets/fonts/
    - .env

  # fonts:
  #   - family: NotoSans
  #     fonts:
  #       - asset: assets/fonts/NotoSans-Regular.ttf
  #       - asset: assets/fonts/NotoSans-Bold.ttf
  #         weight: 700

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF" # Optional: set a background color for adaptive icons
  adaptive_icon_foreground: "assets/images/logo.png" # Optional: use the same logo for foreground
